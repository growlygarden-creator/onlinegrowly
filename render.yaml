services:
  - type: web
    name: growly-garden
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /login
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: GROWLY_DATA_DIR
        value: /var/data
      - key: APP_USERNAME
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: SETTINGS_PASSWORD
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: SUPABASE_REST_ENDPOINT
        sync: false
      - key: SUPABASE_API_KEY
        sync: false
    disk:
      name: growly-data
      mountPath: /var/data
      sizeGB: 1
