services:
  - type: web
    name: growly-garden
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /login
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: GROWLY_DATA_DIR
        value: /var/data
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: APP_USERNAME
        sync: false
      - key: APP_PASSWORD
        sync: false
      - key: DEFAULT_VIEWER_USERNAME
        sync: false
      - key: DEFAULT_VIEWER_PASSWORD
        sync: false
      - key: SETTINGS_PASSWORD
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: SESSION_SAME_SITE
        value: none
      - key: SESSION_HTTPS_ONLY
        value: "true"
      - key: NATIVE_APP_ORIGINS
        value: capacitor://localhost,http://localhost,http://127.0.0.1,ionic://localhost
      - key: SUPABASE_REST_ENDPOINT
        sync: false
      - key: SUPABASE_API_KEY
        sync: false
    disk:
      name: growly-data
      mountPath: /var/data
      sizeGB: 1
